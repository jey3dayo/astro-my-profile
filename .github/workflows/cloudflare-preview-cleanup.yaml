name: Cloudflare Preview Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  cleanup:
    name: Delete PR preview worker
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Delete preview worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PREVIEW_NAME="astro-my-profile-pr-${PR_NUMBER}"

          npx wrangler@4.69.0 delete "$PREVIEW_NAME" --force || {
            echo "No preview worker found or already deleted: $PREVIEW_NAME"
          }
