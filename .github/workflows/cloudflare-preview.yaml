name: Cloudflare Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: cloudflare-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Deploy PR preview to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: Set Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        env:
          DOTENV_PRIVATE_KEY: ${{ secrets.DOTENV_PRIVATE_KEY }}
          APP_NAME: jey3dayo.net
          SITE_DOMAIN: jey3dayo.net
        run: bun run astro:build

      - name: Prepare assetsignore
        run: node scripts/prepare-cloudflare-assetsignore.mjs

      - name: Deploy preview worker
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || 'manual' }}"
          PREVIEW_NAME="astro-my-profile-pr-${PR_NUMBER}"
          echo "preview_name=$PREVIEW_NAME" >> "$GITHUB_OUTPUT"

          bun wrangler deploy --name "$PREVIEW_NAME" 2>&1 | tee /tmp/wrangler-preview.log

          PREVIEW_URL="$(grep -Eo 'https://[^ ]+\.workers\.dev' /tmp/wrangler-preview.log | tail -1 || true)"
          if [ -z "$PREVIEW_URL" ]; then
            echo "Could not detect workers.dev URL from wrangler output" >&2
            exit 1
          fi

          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Upsert preview URL comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
          PREVIEW_NAME: ${{ steps.deploy.outputs.preview_name }}
        with:
          script: |
            const marker = '<!-- cloudflare-preview-comment -->';
            const body = [
              marker,
              '☁️ Cloudflare Preview deployed',
              '',
              `- Worker: \`${process.env.PREVIEW_NAME}\``,
              `- URL: ${process.env.PREVIEW_URL}`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find(c =>
              c.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
